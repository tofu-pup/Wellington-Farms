<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Wellington Farms">
  <meta name="theme-color" content="#2d5016">
  <title>Wellington Farms</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="WellingtonFarms_logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen">
    <div class="auth-content">
      <img src="WellingtonFarms_logo.png" alt="Wellington Farms" class="auth-logo">
      <p class="auth-tagline">Grown with love.</p>
      <button id="sign-in-btn" class="btn-primary btn-large">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-screen" class="screen hidden">

    <!-- HEADER -->
    <header class="app-header">
      <img src="WellingtonFarms_logo.png" alt="" class="header-logo">
      <span class="header-title">Wellington Farms</span>
      <button id="menu-btn" class="icon-btn" aria-label="Menu">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <circle cx="12" cy="5" r="1.8"/>
          <circle cx="12" cy="12" r="1.8"/>
          <circle cx="12" cy="19" r="1.8"/>
        </svg>
      </button>
    </header>

    <!-- GARDEN MAP -->
    <main class="garden-main">
      <div class="garden-map-wrapper" id="garden-map">
        <img src="gardenlayout.png" alt="Garden layout" class="garden-image">
        <div id="bed-overlays"></div>
      </div>
    </main>

    <!-- BED DETAIL SHEET -->
    <div id="bed-sheet" class="bottom-sheet hidden" aria-modal="true">
      <div class="sheet-drag-handle" id="sheet-handle"></div>
      <div class="sheet-scroll">

        <div class="sheet-header">
          <h2 id="sheet-bed-name">Bed 1</h2>
          <button id="sheet-close" class="icon-btn close-btn" aria-label="Close">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>

        <!-- PLANTS SECTION -->
        <section class="sheet-section">
          <div class="section-header">
            <span class="section-title">Plants</span>
            <button id="add-plant-btn" class="btn-small btn-primary">+ Add</button>
          </div>
          <div id="plants-list" class="plants-list">
            <p class="empty-hint">Nothing planted here yet.</p>
          </div>
        </section>

        <!-- FERTILIZATION SECTION -->
        <section class="sheet-section">
          <div class="section-header">
            <span class="section-title">Fertilization</span>
            <button id="add-fertilizer-btn" class="btn-small btn-primary">+ Add</button>
          </div>
          <div id="fertilizer-list" class="fertilizer-list">
            <p class="empty-hint">No fertilization logged yet.</p>
          </div>
        </section>

      </div>
    </div>

    <!-- ADD PLANT PANEL (slides up over bed sheet) -->
    <div id="plant-panel" class="bottom-sheet sub-panel hidden">
      <div class="sheet-drag-handle"></div>
      <div class="sheet-scroll">
        <div class="sheet-header">
          <h3>Add plant to <span id="plant-panel-bed"></span></h3>
          <button id="plant-panel-close" class="icon-btn close-btn">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
        <div class="plant-search-wrap">
          <input type="text" id="plant-search" placeholder="Search or type a plant name…" autocomplete="off" autocorrect="off">
        </div>
        <div id="plant-picker-list" class="plant-picker-list"></div>
        <div class="plant-panel-footer">
          <label class="date-label">Date planted
            <input type="date" id="plant-date-input">
          </label>
          <button id="plant-save-btn" class="btn-primary btn-full" disabled>Add plant</button>
        </div>
      </div>
    </div>

    <!-- ADD FERTILIZER PANEL -->
    <div id="fertilizer-panel" class="bottom-sheet sub-panel hidden">
      <div class="sheet-drag-handle"></div>
      <div class="sheet-scroll">
        <div class="sheet-header">
          <h3>Log fertilization</h3>
          <button id="fert-panel-close" class="icon-btn close-btn">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
        <div class="fert-type-picker">
          <button class="fert-type-btn active" data-type="bokashi">🪣 Bokashi manure</button>
          <button class="fert-type-btn" data-type="compost">🌱 Compost</button>
          <button class="fert-type-btn" data-type="liquid">💧 Liquid fertilizer</button>
          <button class="fert-type-btn" data-type="other">📦 Other</button>
        </div>
        <div id="fert-other-wrap" class="fert-other-wrap hidden">
          <input type="text" id="fert-other-input" placeholder="Describe the fertilizer…">
        </div>
        <div class="plant-panel-footer">
          <label class="date-label">Date applied
            <input type="date" id="fert-date-input">
          </label>
          <button id="fert-save-btn" class="btn-primary btn-full">Log fertilization</button>
        </div>
      </div>
    </div>

    <!-- MENU -->
    <div id="menu-overlay" class="overlay hidden" id="menu-overlay">
      <div class="menu-card">
        <div class="menu-user">
          <img id="user-avatar" src="" alt="" class="avatar">
          <div>
            <div id="user-name" class="user-name-text"></div>
            <div id="user-email" class="user-email-text"></div>
          </div>
        </div>
        <hr class="menu-divider">
        <button id="sign-out-btn" class="menu-item">Sign out</button>
      </div>
      <div class="overlay-backdrop" id="menu-backdrop"></div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast hidden"></div>

  </div><!-- /app-screen -->

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult,
             signOut, onAuthStateChanged }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, collection, doc, addDoc, getDocs, deleteDoc,
             query, orderBy, onSnapshot, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const { FIREBASE_CONFIG, ALLOWED_EMAILS } = await import('./firebase-config.js');

    const fbApp = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(fbApp);
    const db = getFirestore(fbApp);

    window._fb = { auth, db, GoogleAuthProvider, signInWithRedirect, getRedirectResult,
      signOut, onAuthStateChanged, collection, doc, addDoc, getDocs, deleteDoc,
      query, orderBy, onSnapshot, serverTimestamp, ALLOWED_EMAILS };

    const { initApp } = await import('./app.js');
    initApp();
  </script>

</body>
</html>
